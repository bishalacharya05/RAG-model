<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Q&A</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4f46e5, #faf8fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            color: #fff;
        }

        .container {
            width: 600px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            color: #fff;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            background: #10b981;
            color: white;
            padding: 12px;
            font-size: 17px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #059669;
        }

        .response {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 12px;
            color: #111;
        }

        .response h2 {
            color: #111;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Ask Questions based on the PDF</h1>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="question" placeholder="Ask something about your documents..." value="{{ question }}" required>
            <button type="submit">Ask</button>
        </form>

        {% if answer %}
        <div class="response">
            <h2>Answer:</h2>
            <p>{{ answer }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
